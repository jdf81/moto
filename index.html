<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D1A5C">
<title>EXCITE MOTO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
#c{display:block;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);image-rendering:pixelated;}
#controls{position:fixed;bottom:0;left:0;width:100%;height:45%;pointer-events:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 8px 10px;}
.cgroup{display:flex;gap:6px;pointer-events:all;}
.cbtn{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.18);color:#fff;font-size:11px;font-weight:700;font-family:sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;touch-action:none;pointer-events:all;text-shadow:0 1px 2px #000;box-shadow:0 2px 8px rgba(0,0,0,0.4);letter-spacing:0.5px;}
.cbtn:active,.cbtn.pressed{background:rgba(255,200,0,0.45);border-color:rgba(255,220,0,0.9);}
.cbtn.turbo-btn{background:rgba(255,80,0,0.3);border-color:rgba(255,120,0,0.7);}
.cbtn.turbo-btn.pressed{background:rgba(255,100,0,0.6);}
#portrait-msg{display:none;position:fixed;inset:0;background:#0D1A5C;color:#fff;font-family:sans-serif;font-size:20px;font-weight:700;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;text-align:center;padding:20px;}
.spin{font-size:48px;animation:spin 1.5s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(orientation:portrait){#portrait-msg{display:flex;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <div class="cgroup" style="flex-direction:column;gap:6px;">
    <button class="cbtn" data-key="ArrowUp" id="btn-up">LEAN<br>FWD</button>
    <button class="cbtn" data-key="ArrowDown" id="btn-dn">LEAN<br>BACK</button>
  </div>
  <div class="cgroup" style="flex-direction:column;align-items:center;gap:6px;">
    <button class="cbtn turbo-btn" data-key="KeyT" id="btn-turbo">🔥<br>TURBO</button>
    <div style="display:flex;gap:6px;">
      <button class="cbtn" data-key="KeyZ" id="btn-gas">GAS</button>
      <button class="cbtn" data-key="KeyX" id="btn-brk">BRAKE</button>
    </div>
  </div>
</div>
<div id="portrait-msg"><div class="spin">📱</div><div>Rotate to Landscape<br>to Play</div></div>
<script>
// ============================================================
//  EXCITE MOTO — PWA
// ============================================================

// -- PWA manifest & service worker
(function(){
  const manifest={name:"Excite Moto",short_name:"ExciteMoto",display:"fullscreen",orientation:"landscape",background_color:"#0D1A5C",theme_color:"#0D1A5C",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230D1A5C'/%3E%3Ccircle cx='160' cy='340' r='80' fill='%23C8963C' stroke='%238A6520' stroke-width='12'/%3E%3Ccircle cx='370' cy='340' r='70' fill='%23C8963C' stroke='%238A6520' stroke-width='12'/%3E%3Cpolygon points='140,280 380,280 350,200 200,180' fill='%23EE2222'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  const ml=document.createElement("link");
  ml.rel="manifest";ml.id="mlink";
  ml.href=URL.createObjectURL(blob);
  document.head.appendChild(ml);
  if("serviceWorker" in navigator){
    const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>{});`;
    const swb=new Blob([sw],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(swb));
  }
})();

// -- Canvas setup
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const VW=480,VH=270;
canvas.width=VW;canvas.height=VH;

function resize(){
  const s=Math.min(window.innerWidth/VW,window.innerHeight/VH);
  canvas.style.width=Math.floor(VW*s)+"px";
  canvas.style.height=Math.floor(VH*s)+"px";
}
window.addEventListener("resize",resize);
resize();

// ============================================================
//  CONSTANTS
// ============================================================
const LAP_LENGTH=220000000;
const LAPS=9;
const TARGET_X=LAPS*LAP_LENGTH;
const WHEEL_R=7;
const GRAVITY=0.38;
const MAX_SPEED=5555.5;
const TURBO_SPEED=999.5;
const ACCEL=0.13;
const BRAKE_F=0.35;
const FRICTION=0.04;
const CRASH_ANGLE=0.62;
const MIN_AIR_TIME=12;
const MAX_TEMP=100;
const TEMP_RISE=0.8;
const TEMP_COOL=0.35;
const OVERHEAT_TIME=160;
const TRACK_Y=VH*0.72; // ground reference line

// ============================================================
//  TRACK GENERATION
// ============================================================
const HM_LEN=LAP_LENGTH+20;
const heightmap=new Float32Array(HM_LEN);
const features=[];

function generateTrack(){
  // flat base
  for(let i=0;i<HM_LEN;i++) heightmap[i]=0;

  // features
  let fx=120;
  while(fx<LAP_LENGTH-150){
    const roll=Math.random();
    if(roll<0.35){
      // ramp
      const w=50+Math.random()*60;
      const h=18+Math.random()*28;
      features.push({type:"ramp",x:fx,w,h,base:0});
      // stamp into heightmap
      for(let i=0;i<HM_LEN;i++){
        const d=i-fx;
        if(d>=0&&d<w){
          const t=d/w;
          // ramp up then drop
          const rh=t<0.6?h*(t/0.6):h*(1-(t-0.6)/0.4);
          if(heightmap[i]<rh) heightmap[i]=rh;
        }
      }
      fx+=w+60+Math.random()*80;
    } else if(roll<0.6){
      // bump (sine)
      const w=30+Math.random()*40;
      const h=10+Math.random()*16;
      for(let i=0;i<HM_LEN;i++){
        const d=i-fx;
        if(d>=0&&d<w){
          const v=h*Math.sin(Math.PI*d/w);
          if(heightmap[i]<v) heightmap[i]=v;
        }
      }
      fx+=w+40+Math.random()*60;
    } else if(roll<0.78){
      // downslope then upslope valley
      const w=80+Math.random()*60;
      const depth=8+Math.random()*12;
      for(let i=0;i<HM_LEN;i++){
        const d=i-fx;
        if(d>=0&&d<w){
          const t=d/w;
          heightmap[i]-=depth*Math.sin(Math.PI*t)*0.7;
        }
      }
      fx+=w+50;
    } else {
      // mud patch
      const w=40+Math.random()*60;
      features.push({type:"mud",x:fx,w});
      fx+=w+50+Math.random()*80;
    }
    fx+=Math.random()*30;
  }

  // smooth 6 passes
  for(let p=0;p<6;p++){
    for(let i=1;i<HM_LEN-1;i++){
      heightmap[i]=(heightmap[i-1]+heightmap[i]*2+heightmap[i+1])/4;
    }
  }
}

function TY(worldX){
  // worldX is absolute; mod by LAP_LENGTH to get track height
  const tx=((worldX%LAP_LENGTH)+LAP_LENGTH)%LAP_LENGTH;
  const i=Math.floor(tx);
  const f=tx-i;
  const a=heightmap[Math.min(i,HM_LEN-1)];
  const b=heightmap[Math.min(i+1,HM_LEN-1)];
  return TRACK_Y-(a+(b-a)*f);
}

generateTrack();

// ============================================================
//  INPUT
// ============================================================
const keys={};
document.addEventListener("keydown",e=>{keys[e.code]=true;});
document.addEventListener("keyup",e=>{keys[e.code]=false;});

// button mapping
const btnMap={"ArrowUp":"ArrowUp","ArrowDown":"ArrowDown","KeyZ":"KeyZ","KeyX":"KeyX","KeyT":"KeyT"};
document.querySelectorAll(".cbtn").forEach(btn=>{
  const k=btn.dataset.key;
  btn.addEventListener("pointerdown",e=>{e.preventDefault();keys[k]=true;btn.classList.add("pressed");});
  btn.addEventListener("pointerup",e=>{e.preventDefault();keys[k]=false;btn.classList.remove("pressed");});
  btn.addEventListener("pointerleave",e=>{keys[k]=false;btn.classList.remove("pressed");});
  btn.addEventListener("pointercancel",e=>{keys[k]=false;btn.classList.remove("pressed");});
});

// ============================================================
//  PARTICLES
// ============================================================
const particles=[];
function spawnDust(x,y,n=6){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*2,vy:-Math.random()*1.5-0.5,life:25+Math.random()*20,maxLife:0,r:Math.random()*3+1,col:"rgba(200,150,60,"});
    particles[particles.length-1].maxLife=particles[particles.length-1].life;
  }
}
function spawnMud(x,y,n=8){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*3,vy:-Math.random()*2-1,life:30+Math.random()*20,maxLife:0,r:Math.random()*2.5+1,col:"rgba(107,82,40,"});
    particles[particles.length-1].maxLife=particles[particles.length-1].life;
  }
}
function spawnFlame(x,y,n=5){
  for(let i=0;i<n;i++){
    const hot=Math.random()>0.5;
    particles.push({x,y,vx:-Math.random()*3-1,vy:(Math.random()-0.5)*0.8,life:12+Math.random()*8,maxLife:0,r:Math.random()*2+1,col:hot?"rgba(255,200,0,":"rgba(255,100,0,"});
    particles[particles.length-1].maxLife=particles[particles.length-1].life;
  }
}
function spawnCrash(x,y,col,n=12){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*5,vy:-Math.random()*4-1,life:40+Math.random()*20,maxLife:0,r:Math.random()*3+2,col:`rgba(${parseInt(col.slice(1,3),16)},${parseInt(col.slice(3,5),16)},${parseInt(col.slice(5,7),16)},`});
    particles[particles.length-1].maxLife=particles[particles.length-1].life;
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;
    if(p.life<=0){particles.splice(i,1);}
  }
}
function drawParticles(camX){
  for(const p of particles){
    const a=p.life/p.maxLife;
    ctx.fillStyle=p.col+a.toFixed(2)+")";
    ctx.beginPath();ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
}

// ============================================================
//  BIKE CLASS
// ============================================================
class Bike {
  constructor(color,isPlayer,cpuFactor=1){
    this.color=color;
    this.isPlayer=isPlayer;
    this.cpuFactor=cpuFactor;
    this.reset();
  }
  reset(){
    this.totalX=0;
    this.x=80; // screen-relative start (stagger)
    this.vy=0;
    this.speed=0;
    this.angle=0;
    this.angularV=0;
    this.onGround=true;
    this.airTime=0;
    this.crashed=false;
    this.crashTimer=0;
    this.lap=1;
    this.finished=false;
    this.finishTime=0;
    this.temp=0;
    this.overheating=false;
    this.overheatTimer=0;
    this.inMud=false;
    this.screenY=TY(this.totalX)-WHEEL_R;
  }
  get screenX(){return this.totalX;} // used for world, subtract camX for screen
  update(camX,isPlayer,frame){
    if(this.finished) return;
    if(this.crashed){
      this.crashTimer--;
      if(this.crashTimer<=0){
        this.crashed=false;
        this.speed=0;
        this.angle=0;
        this.angularV=0;
        this.vy=0;
        // snap to ground
        this.screenY=TY(this.totalX)-WHEEL_R;
        this.onGround=true;
      }
      // slide while crashed
      this.totalX+=this.speed*0.3;
      this.screenY+=this.vy;
      this.vy+=GRAVITY;
      const gy=TY(this.totalX)-WHEEL_R;
      if(this.screenY>=gy){this.screenY=gy;this.vy=0;}
      return;
    }

    const gas=isPlayer?keys["KeyZ"]:true;
    const brk=isPlayer?keys["KeyX"]:false;
    const turbo=isPlayer?(keys["KeyT"]&&!this.overheating):false;
    const leanF=isPlayer?keys["ArrowUp"]:false;
    const leanB=isPlayer?keys["ArrowDown"]:false;

    // -- temperature
    if(turbo){
      this.temp+=TEMP_RISE;
      if(this.temp>=MAX_TEMP){this.temp=MAX_TEMP;this.overheating=true;this.overheatTimer=OVERHEAT_TIME;}
    } else if(this.onGround){
      this.temp=Math.max(0,this.temp-TEMP_COOL);
    }
    if(this.overheating){
      this.overheatTimer--;
      if(this.overheatTimer<=0){this.overheating=false;this.temp=40;}
    }

    // -- mud check
    this.inMud=false;
    for(const rep of[-1,0,1]){
      for(const f of features){
        if(f.type==="mud"){
          const fx=f.x+rep*LAP_LENGTH;
          if(this.totalX>=fx&&this.totalX<=fx+f.w){this.inMud=true;break;}
        }
      }
      if(this.inMud) break;
    }

    const topSpeed=(turbo?TURBO_SPEED:MAX_SPEED)*(this.inMud?0.55:1)*this.cpuFactor;
    // acceleration
    if(gas&&!brk){
      this.speed+=ACCEL*(this.inMud?0.5:1);
      if(this.speed>topSpeed) this.speed=topSpeed;
    } else if(brk){
      this.speed-=BRAKE_F;
      if(this.speed<0) this.speed=0;
    } else {
      this.speed-=FRICTION;
      if(this.speed<0) this.speed=0;
    }

    // CPU slight speed variance
    if(!isPlayer) this.speed+=Math.sin(frame*0.03+this.cpuFactor*7)*0.03;

    // lean
    const LEAN=0.022;
    const ANG_DAMP=0.82;
    if(leanF) this.angularV-=LEAN;
    if(leanB) this.angularV+=LEAN;
    this.angularV*=ANG_DAMP;
    this.angle+=this.angularV;
    this.angle=Math.max(-0.9,Math.min(0.9,this.angle));

    // move
    this.totalX+=this.speed;

    // terrain height
    const groundY=TY(this.totalX)-WHEEL_R;
    const aheadY=TY(this.totalX+20)-WHEEL_R;
    const launched=aheadY<groundY-4;

    if(this.onGround){
      this.screenY=groundY;
      // natural lean to terrain slope
      const dy=TY(this.totalX+4)-TY(this.totalX-4);
      const slopeAng=Math.atan2(-dy,8)*0.7;
      if(!leanF&&!leanB){
        this.angle+=(slopeAng-this.angle)*0.15;
      }
      if(launched){
        this.vy=-2;
        this.onGround=false;
        this.airTime=0;
      }
    } else {
      this.vy+=GRAVITY;
      this.screenY+=this.vy;
      this.airTime++;
      if(this.screenY>=groundY){
        // landing
        const landed=this.screenY>=groundY;
        if(landed){
          const absAngle=Math.abs(this.angle);
          if(absAngle>CRASH_ANGLE&&this.airTime>MIN_AIR_TIME){
            this.crash();
          } else {
            if(this.airTime>10) spawnDust(this.totalX,groundY+WHEEL_R,8);
            this.screenY=groundY;
            this.vy=0;
            this.onGround=true;
            this.airTime=0;
            // dampen angle on landing
            this.angle*=0.4;
            this.angularV*=0.3;
          }
        }
      }
    }

    // mud particles
    if(this.inMud&&this.onGround&&this.speed>1&&(frame%4===0)){
      spawnMud(this.totalX,this.screenY+WHEEL_R,3);
    }
    // turbo flame
    if(turbo&&(frame%3===0)){
      const wx=this.totalX-12;
      const wy=this.screenY-12;
      spawnFlame(wx,wy,4);
    }

    // lap check
    if(this.totalX>=this.lap*LAP_LENGTH){
      this.lap++;
      if(isPlayer) lapFlash=90;
      if(this.totalX>=TARGET_X&&!this.finished){
        this.finished=true;
        this.finishTime=raceTime;
      }
    }
  }
  crash(){
    this.crashed=true;
    this.crashTimer=80;
    this.vy=-4;
    spawnCrash(this.totalX,this.screenY,this.color,14);
  }
  draw(camX){
    const sx=this.totalX-camX;
    const sy=this.screenY;
    ctx.save();
    ctx.translate(sx,sy);
    ctx.rotate(this.crashed?Math.PI/5:this.angle);
    this._drawBike();
    ctx.restore();
  }
  _drawBike(){
    const c=this.color;
    // rear wheel
    ctx.beginPath();ctx.arc(-9,0,WHEEL_R,0,Math.PI*2);
    ctx.fillStyle="#1a1a1a";ctx.fill();
    ctx.strokeStyle="#555";ctx.lineWidth=2;ctx.stroke();
    // front wheel
    ctx.beginPath();ctx.arc(9,0,6,0,Math.PI*2);
    ctx.fillStyle="#1a1a1a";ctx.fill();
    ctx.strokeStyle="#555";ctx.lineWidth=2;ctx.stroke();
    // exhaust pipe
    ctx.fillStyle="#888";
    ctx.fillRect(-17,-11,6,4);
    // frame
    ctx.fillStyle=c;
    ctx.beginPath();
    ctx.moveTo(-11,-1);ctx.lineTo(11,-1);
    ctx.lineTo(9,-11);ctx.lineTo(-1,-13);
    ctx.lineTo(-7,-9);ctx.closePath();
    ctx.fill();
    // engine
    ctx.fillStyle="#555";ctx.fillRect(-4,-8,9,5);
    ctx.fillStyle="#888";ctx.fillRect(-3,-7,4,3);
    // seat
    ctx.fillStyle="#222";ctx.fillRect(-3,-14,8,3);
    // handlebars
    ctx.strokeStyle="#aaa";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(7,-13);ctx.lineTo(12,-17);ctx.stroke();
    // rider legs
    const dc=darken(c,0.5);
    ctx.fillStyle=dc;ctx.fillRect(-2,-14,5,6);
    // rider body
    ctx.fillStyle=c;ctx.fillRect(-3,-26,8,12);
    // rider arm
    ctx.strokeStyle=c;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(4,-23);ctx.lineTo(12,-17);ctx.stroke();
    // helmet
    ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(3,-28,5,0,Math.PI*2);ctx.fill();
    // visor
    ctx.fillStyle=c;
    ctx.beginPath();ctx.arc(3,-28,5,0.2,1.0);ctx.fill();
    // turbo flame (drawn at exhaust)
    if(this.isPlayer&&keys["KeyT"]&&!this.overheating){
      ctx.fillStyle="#ff8800";
      ctx.beginPath();ctx.moveTo(-17,-9);ctx.lineTo(-24,-11);ctx.lineTo(-17,-11);ctx.closePath();ctx.fill();
      ctx.fillStyle="#ffee00";
      ctx.beginPath();ctx.moveTo(-17,-10);ctx.lineTo(-21,-11);ctx.lineTo(-17,-11);ctx.closePath();ctx.fill();
    }
  }
}
function darken(hex,f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
}

// ============================================================
//  BACKGROUND HILLS
// ============================================================
function generateHills(seed,n,yBase,h,col){
  const pts=[];
  let rng=seed;
  function rand(){rng=(rng*1664525+1013904223)&0xffffffff;return(rng>>>0)/4294967296;}
  let x=0;
  while(x<LAP_LENGTH+400){
    const w=120+rand()*200;
    const hh=h*0.4+rand()*h;
    pts.push({x,w,h:hh});
    x+=w*0.6+rand()*80;
  }
  return{pts,yBase,col};
}
const hillLayers=[
  generateHills(42,20,VH*0.68,40,"#153215"),
  generateHills(77,16,VH*0.74,30,"#244A22"),
];

function drawHillLayer(layer,camX,factor){
  const{pts,yBase,col}=layer;
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(0,VH);
  // draw hills tiling
  for(let rep=-1;rep<=1;rep++){
    for(const p of pts){
      const hx=(p.x+rep*LAP_LENGTH)-camX*factor;
      ctx.arc(hx+p.w/2,yBase,p.w/2,Math.PI,0,false);
    }
  }
  ctx.lineTo(VW,VH);ctx.closePath();ctx.fill();
}

// ============================================================
//  GAME STATE
// ============================================================
let state="title"; // title | countdown | racing | results
let frame=0;
let raceTime=0;
let camX=0; // total camera world X
let lapFlash=0;
let countdownTimer=0;
let flashAlpha=0;
let overheatFlash=0;

const COLORS=["#EE2222","#2266EE","#DDCC22","#22CC66"];
const CPU_FACTORS=[0.88,0.81,0.74];

let player,cpus,allBikes;

function initRace(){
  player=new Bike(COLORS[0],true,1);
  player.totalX=0;
  cpus=[
    new Bike(COLORS[1],false,CPU_FACTORS[0]),
    new Bike(COLORS[2],false,CPU_FACTORS[1]),
    new Bike(COLORS[3],false,CPU_FACTORS[2]),
  ];
  cpus[0].totalX=-30;
  cpus[1].totalX=-55;
  cpus[2].totalX=-80;
  allBikes=[player,...cpus];
  camX=0;
  raceTime=0;
  lapFlash=0;
  flashAlpha=0;
  frame=0;
  particles.length=0;
}

// ============================================================
//  RENDERING
// ============================================================
function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,VH*0.75);
  g.addColorStop(0,"#0D1A5C");
  g.addColorStop(1,"#3355AA");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,VW,VH);
}

function drawTrack(camX){
  // grass fill from track down
  ctx.fillStyle="#2E6B1A";
  ctx.fillRect(0,TRACK_Y,VW,VH-TRACK_Y);

  // track surface polygon
  ctx.fillStyle="#C8963C";
  ctx.beginPath();
  ctx.moveTo(0,VH);
  for(let sx=0;sx<=VW;sx+=2){
    const ty=TY(camX+sx);
    ctx.lineTo(sx,ty);
  }
  ctx.lineTo(VW,VH);ctx.closePath();ctx.fill();

  // track edge line
  ctx.strokeStyle="#8A6520";ctx.lineWidth=2;
  ctx.beginPath();
  for(let sx=0;sx<=VW;sx+=2){
    const ty=TY(camX+sx);
    if(sx===0) ctx.moveTo(sx,ty);else ctx.lineTo(sx,ty);
  }
  ctx.stroke();
}

function drawFeatures(camX){
  const curRep=Math.floor(camX/LAP_LENGTH);
  for(let rep=curRep-1;rep<=curRep+1;rep++){
    for(const f of features){
      const fx=f.x+rep*LAP_LENGTH-camX;
      if(fx>VW+60||fx+f.w<-60) continue;
      if(f.type==="mud"){
        // mud patch on track surface
        for(let mx=0;mx<f.w;mx+=3){
          const tx=fx+mx;
          const ty=TY(camX+tx+fx-fx);
          ctx.fillStyle=mx%6<3?"#6B5228":"#9A7A44";
          ctx.fillRect(tx,ty,3,4);
        }
      } else if(f.type==="ramp"){
        // ramp stripes
        ctx.save();
        for(let rx=0;rx<f.w;rx+=8){
          const tx=fx+rx;
          const ty=TY(camX+tx+fx-fx);
          ctx.fillStyle=rx%16<8?"#E8C050":"#C8963C";
          ctx.fillRect(tx,ty-1,8,3);
        }
        ctx.restore();
      }
    }
  }
}

function drawFinishLines(camX){
  // draw lap/finish markers
  const curRep=Math.floor(camX/LAP_LENGTH);
  for(let rep=curRep-1;rep<=curRep+1;rep++){
    const finX=rep*LAP_LENGTH-camX;
    if(finX>-20&&finX<VW+20){
      const ty=TY(camX+finX+camX-camX);
      // pole
      ctx.fillStyle="#fff";ctx.fillRect(finX-2,ty-40,4,40);
      // checkered
      const isFinish=rep>0;
      for(let ci=0;ci<4;ci++){
        ctx.fillStyle=(ci%2===0)?(isFinish?"#111":"#ff4400"):"#fff";
        ctx.fillRect(finX-2,ty-40+ci*10,20,10);
        ctx.fillStyle=(ci%2===0)?"#fff":(isFinish?"#111":"#ff4400");
        ctx.fillRect(finX+8,ty-40+ci*10,10,10);
      }
    }
  }
}

function drawHUD(){
  if(state!=="racing") return;
  const speed=Math.round(player.speed*(MAX_SPEED>0?180/MAX_SPEED:0));
  const lap=Math.min(player.lap,LAPS);
  const pos=getPosition();

  // speed
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(4,4,72,32);
  ctx.fillStyle="#fff";ctx.font="bold 10px monospace";
  ctx.fillText("SPEED",6,14);
  ctx.font="bold 18px monospace";ctx.fillStyle="#ffee44";
  ctx.fillText(speed.toString().padStart(3,"0"),6,30);

  // lap
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(VW-70,4,66,32);
  ctx.fillStyle="#fff";ctx.font="bold 10px monospace";ctx.fillText("LAP",VW-68,14);
  ctx.fillStyle="#ffee44";ctx.font="bold 18px monospace";
  ctx.fillText(`${lap}/${LAPS}`,VW-68,30);

  // position
  const ordinal=["1ST","2ND","3RD","4TH"];
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(VW/2-24,4,48,22);
  ctx.fillStyle="#fff";ctx.font="bold 14px monospace";
  ctx.textAlign="center";
  ctx.fillText(ordinal[pos-1]||"4TH",VW/2,19);
  ctx.textAlign="left";

  // time
  const secs=Math.floor(raceTime/60);
  const frac=Math.floor((raceTime%60)*100/60);
  const ts=`${String(Math.floor(secs/60)).padStart(2,"0")}:${String(secs%60).padStart(2,"0")}.${String(frac).padStart(2,"0")}`;
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(VW/2-38,VH-22,76,18);
  ctx.fillStyle="#aaa";ctx.font="10px monospace";ctx.textAlign="center";
  ctx.fillText(ts,VW/2,VH-9);ctx.textAlign="left";

  // temp bar
  const barW=60,barH=8;
  const bx=4,by=40;
  ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(bx-1,by-1,barW+2,barH+2);
  const tf=player.temp/MAX_TEMP;
  const barCol=tf<0.5?"#44ee44":tf<0.8?"#eeee00":"#ee2222";
  ctx.fillStyle=barCol;
  ctx.fillRect(bx,by,barW*tf,barH);
  ctx.fillStyle="#555";
  ctx.fillRect(bx+barW*tf,by,barW*(1-tf),barH);
  ctx.fillStyle="#aaa";ctx.font="8px monospace";
  ctx.fillText("TEMP",bx,by+barH+9);

  // overheat warning
  if(player.overheating){
    overheatFlash=(overheatFlash+1)%30;
    if(overheatFlash<15){
      ctx.fillStyle="rgba(255,0,0,0.35)";
      ctx.fillRect(0,0,VW,VH);
      ctx.fillStyle="#ff4444";ctx.font="bold 16px monospace";ctx.textAlign="center";
      ctx.fillText("!! OVERHEAT !!",VW/2,VH/2-20);ctx.textAlign="left";
    }
  }

  // lap flash
  if(lapFlash>0){
    lapFlash--;
    const a=Math.min(1,lapFlash/30);
    ctx.fillStyle=`rgba(255,255,255,${a*0.6})`;
    ctx.fillRect(0,0,VW,VH);
    ctx.fillStyle=`rgba(255,220,0,${a})`;
    ctx.font="bold 22px monospace";ctx.textAlign="center";
    const txt=player.lap>LAPS?"FINISH!":"LAP "+Math.min(player.lap,LAPS);
    ctx.fillText(txt,VW/2,VH/2);ctx.textAlign="left";
  }

  // crash hint
  if(player.crashed){
    ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(VW/2-50,VH*0.6-10,100,18);
    ctx.fillStyle="#ff8888";ctx.font="bold 11px monospace";ctx.textAlign="center";
    ctx.fillText("CRASHED!",VW/2,VH*0.6+4);ctx.textAlign="left";
  }
}

function getPosition(){
  const sorted=[...allBikes].sort((a,b)=>b.totalX-a.totalX);
  return sorted.indexOf(player)+1;
}

function drawTitle(){
  ctx.fillStyle="rgba(0,0,40,0.82)";ctx.fillRect(0,0,VW,VH);
  ctx.textAlign="center";
  // title glow
  ctx.shadowColor="#ff8800";ctx.shadowBlur=20;
  ctx.fillStyle="#ffcc00";ctx.font="bold 36px monospace";
  ctx.fillText("EXCITE MOTO",VW/2,VH/2-30);
  ctx.shadowBlur=0;
  ctx.fillStyle="#fff";ctx.font="bold 12px monospace";
  ctx.fillText("PROCEDURAL RACING",VW/2,VH/2-6);
  ctx.fillStyle="#aaddff";ctx.font="11px monospace";
  ctx.fillText("GAS to Start",VW/2,VH/2+20);
  ctx.fillStyle="#888";ctx.font="9px monospace";
  ctx.fillText("GAS · BRAKE · LEAN FWD/BACK · TURBO",VW/2,VH/2+38);
  ctx.textAlign="left";
}

function drawCountdown(){
  const n=Math.ceil(countdownTimer/60);
  ctx.textAlign="center";ctx.shadowColor="#fff";ctx.shadowBlur=30;
  ctx.fillStyle="#fff";ctx.font=`bold ${50-n*3}px monospace`;
  ctx.fillText(n>0?n:"GO!",VW/2,VH/2);
  ctx.shadowBlur=0;ctx.textAlign="left";
}

function drawResults(){
  ctx.fillStyle="rgba(0,0,40,0.88)";ctx.fillRect(0,0,VW,VH);
  ctx.textAlign="center";
  ctx.fillStyle="#ffcc00";ctx.font="bold 20px monospace";
  const pos=getPosition();
  const medals=["🥇","🥈","🥉","💀"];
  ctx.fillText(medals[pos-1]+" RACE OVER "+medals[pos-1],VW/2,50);
  const ordinal=["1ST","2ND","3RD","4TH"];
  ctx.fillStyle="#fff";ctx.font="bold 14px monospace";
  ctx.fillText("YOU FINISHED "+ordinal[pos-1],VW/2,78);

  // times
  const allSorted=[...allBikes].sort((a,b)=>{
    if(a.finished&&!b.finished) return-1;
    if(!a.finished&&b.finished) return 1;
    if(a.finished&&b.finished) return a.finishTime-b.finishTime;
    return b.totalX-a.totalX;
  });
  const names=["YOU","CPU 1","CPU 2","CPU 3"];
  for(let i=0;i<allSorted.length;i++){
    const b=allSorted[i];
    const nm=b.isPlayer?"YOU":"CPU "+(cpus.indexOf(b)+1);
    const secs=b.finished?Math.floor(b.finishTime/60):null;
    const timeStr=secs!=null?`${String(Math.floor(secs/60)).padStart(2,"0")}:${String(secs%60).padStart(2,"0")}`:"-DNF-";
    ctx.fillStyle=b.color;ctx.font="bold 13px monospace";
    ctx.fillText(`${i+1}. ${nm}  ${timeStr}`,VW/2,108+i*22);
  }
  ctx.fillStyle="#aaddff";ctx.font="11px monospace";
  ctx.fillText("GAS to Restart",VW/2,VH-20);
  ctx.textAlign="left";
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop(){
  requestAnimationFrame(loop);
  frame++;

  // -- STATE MACHINE
  if(state==="title"){
    drawSky();
    // animated track preview
    const previewCam=frame*0.5%LAP_LENGTH;
    drawHillLayer(hillLayers[0],previewCam,0.18);
    drawHillLayer(hillLayers[1],previewCam,0.45);
    drawTrack(previewCam);
    drawTitle();
    if(keys["KeyZ"]){
      initRace();
      state="countdown";
      countdownTimer=180; // 3 seconds
    }
    return;
  }

  if(state==="countdown"){
    raceTime=0;
    // draw world but no movement
    drawSky();
    const cx=player.totalX;
    drawHillLayer(hillLayers[0],cx,0.18);
    drawHillLayer(hillLayers[1],cx,0.45);
    drawTrack(cx);
    drawFeatures(cx);
    drawFinishLines(cx);
    for(const b of allBikes) b.draw(cx);
    countdownTimer--;
    drawCountdown();
    if(countdownTimer<=0) state="racing";
    return;
  }

  if(state==="racing"){
    raceTime++;

    // update all bikes
    player.update(camX,true,frame);
    for(const cpu of cpus) cpu.update(camX,false,frame);

    // camera follows player
    const targetCamX=player.totalX-(VW*0.3);
    camX+=(targetCamX-camX)*0.12;

    updateParticles();

    // -- DRAW
    drawSky();
    drawHillLayer(hillLayers[0],camX,0.18);
    drawHillLayer(hillLayers[1],camX,0.45);
    drawTrack(camX);
    drawFeatures(camX);
    drawFinishLines(camX);
    drawParticles(camX);

    // bikes sorted by totalX (back to front)
    const sorted=[...allBikes].sort((a,b)=>a.totalX-b.totalX);
    for(const b of sorted) b.draw(camX);

    drawHUD();

    // lap flash overlay handled inside drawHUD
    // white flash on crossing lap line
    if(flashAlpha>0){
      ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;
      ctx.fillRect(0,0,VW,VH);
      flashAlpha-=0.06;
    }

    // check race end
    if(player.finished){
      // wait a moment then show results
      if(!player._resultsTimer) player._resultsTimer=0;
      player._resultsTimer++;
      if(player._resultsTimer>180) state="results";
    }
    // all CPUs finished but player still going — forced finish after time
    if(raceTime>60*180&&!player.finished){
      player.finished=true;player.finishTime=raceTime;
    }
    return;
  }

  if(state==="results"){
    // draw frozen world
    drawSky();
    drawHillLayer(hillLayers[0],camX,0.18);
    drawHillLayer(hillLayers[1],camX,0.45);
    drawTrack(camX);
    drawFeatures(camX);
    for(const b of allBikes) b.draw(camX);
    drawResults();
    if(keys["KeyZ"]){
      state="title";
      // reset key to avoid immediate retrigger
      keys["KeyZ"]=false;
    }
  }
}

loop();
</script>
